services:
  db:
    image: postgres:15-alpine
    container_name: urlshortener_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: urlshortener_app
    working_dir: /app                    # ensures relative paths work
    volumes:
      - .:/app                           # mount the entire project (app + tests)
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/shortener
      BASE_DOMAIN: http://localhost:8000
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
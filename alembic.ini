# Конфигурация Alembic для миграций базы данных
# 
# Для инициализации:
# alembic init alembic
#
# Создание миграции:
# alembic revision --autogenerate -m "Description"
#
# Применение миграций:
# alembic upgrade head

[alembic]
# Путь к директории с миграциями
script_location = alembic

# Шаблон для имен файлов миграций
file_template = %%(rev)s_%%(slug)s

# Timezone для timestamps
# timezone =

# Максимальная длина ревизии
truncate_slug_length = 40

# URL базы данных (можно переопределить через env.py)
# sqlalchemy.url = postgresql://user:password@localhost/dbname

# Логирование
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

